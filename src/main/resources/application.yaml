spring:
  application:
    name: localbuddy-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: LocalBuddyHikariPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 300000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: never

  health:
    redis:
      enabled: false

logging:
  level:
    root: INFO
    com.localbuddy: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}

  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  platform:
    default-city: Amsterdam
    commission-percentage: 20

  notifications:
    processor-delay-ms: 10000

  payments:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/payment/success}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/payment/cancel}
  booking:
    pending-payment-expiration-minutes: ${BOOKING_PENDING_PAYMENT_EXPIRATION_MINUTES:30}
    expiry-processor-delay-ms: ${BOOKING_EXPIRY_PROCESSOR_DELAY_MS:60000}
  email:
    provider: ${EMAIL_PROVIDER:console}
    from-address: ${EMAIL_FROM_ADDRESS:no-reply@localbuddy.dev}
    from-name: ${EMAIL_FROM_NAME:LocalBuddy}

  azure:
    communication:
      connection-string: ${AZURE_COMMUNICATION_CONNECTION_STRING:}

  dev-admin:
    email: ${DEV_ADMIN_EMAIL:admin@test.com}
    password: ${DEV_ADMIN_PASSWORD:Password@123}
    full-name: ${DEV_ADMIN_FULL_NAME:Test Admin}
    phone: ${DEV_ADMIN_PHONE:+10000000000}

  support:
    email: ${SUPPORT_EMAIL:admin@test.com}

  rate-limit:
    public-api:
      max-requests: ${PUBLIC_API_RATE_LIMIT_MAX_REQUESTS:20}
      window-seconds: ${PUBLIC_API_RATE_LIMIT_WINDOW_SECONDS:60}
